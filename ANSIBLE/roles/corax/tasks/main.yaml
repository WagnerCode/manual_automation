- name: Extract DSTR from the archive
  become: yes
  run_once: yes
  delegate_to: "{{ ansible_play_batch[0]}}"
  unarchive:
    src: "{{ config.vm_params[0].dstr_path }}{{ config.vm_params[0].dstr_file }}"
    dest: "/pub"
    creates: "/pub/corax/"


# Repeat below two steps. Where executed before, but under different tag. To make all tags working consistently, doing the same again.

- name: Read keystore password
  delegate_to: localhost
  run_once: true
  slurp:
    src: '{{ playbook_dir }}/secrets/ks_secret.txt'
  register: keystore_file_content

- name: Register keystore password
  delegate_to: localhost
  run_once: true
  set_fact: 
    keystore_password: "{{ keystore_file_content.content | b64decode | trim }}"

- name: Set FQDN
  set_fact:
    ansible_facts:
      fqdn: "{{ inventory_hostname }}.{{ domain }}"

- name: Set corax dir
  set_fact:
     corax_dir: "/pub/corax/"

- name: "Create user {{ kafka_user }}"
  become: yes
  ansible.builtin.user:
    name: "{{ kafka_user }}"

- name: Clean kafka installdir
  become: yes
  file: 
    path: "{{kafka.installdir}}"
    state: "absent"

- name: Clean zookeeper installdir
  become: yes
  file: 
    path: "{{zookeeper.installdir}}"
    state: "absent"

- name: Create SSL folder in the kafka installdir
  become: yes
  file:
    #path: "{{ corax_dir }}inventories/ssl"
    path: "{{kafka.installdir}}/ssl"
    state: directory
    mode: '0755'
    owner: "{{ kafka_user }}" 
    group: "{{ kafka_group }}" 

- name: Create SSL folder in the zookeeper installdir
  become: yes
  file:
    #path: "{{ corax_dir }}inventories/ssl"
    path: "{{zookeeper.installdir}}/ssl"
    state: directory
    mode: '0755'
    owner: "{{ kafka_user }}" 
    group: "{{ kafka_group }}" 


#- name: Run Corax_Prepare task
