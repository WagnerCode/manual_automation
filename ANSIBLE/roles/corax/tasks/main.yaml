- name: Create group_vars on the first host 
  become: yes
  run_once: yes
  delegate_to: "{{ ansible_play_batch[0] }}"
  template:
    src: templates/all.tmpl
    dest: "{{ corax_dir }}inventories/group_vars/all.yaml"

- name: Create Inventory on the first host 
  become: yes
  #run_once: yes
  delegate_to: "{{ ansible_play_batch[0] }}"
  template:
    src: templates/inventory.tmpl
    dest: "{{ corax_dir }}inventories/inventory.ini"
  retries: 3
  delay: 5
  throttle: 1

- name: Copy modified helper/unpack.yml - no clean_dir there anymore
  become: yes
  run_once: yes
  delegate_to: "{{ ansible_play_batch[0]}}"
  copy:
    src: "files/unpack.yml"
    dest: "{{ corax_dir }}helper/unpack.yml"

- name: Copy modified roles/zookeeper/tasks/zookeeper_SECMAN.yml - no clean_dir there anymore
  become: yes
  run_once: yes
  delegate_to: "{{ ansible_play_batch[0]}}"
  copy:
    src: "files/zookeeper_SECMAN.yml"
    dest: "{{ corax_dir }}roles/zookeeper/tasks/zookeeper_SECMAN.yml"

- name: Copy modified roles/zookeeper/tasks/zookeeper_SSL.yml - no Upload .jks here
  become: yes
  run_once: yes
  delegate_to: "{{ ansible_play_batch[0]}}"
  copy:
    src: "files/zookeeper_SSL.yml"
    dest: "{{ corax_dir }}roles/zookeeper/tasks/zookeeper_SSL.yml"

- name: Copy modified roles/kafka/tasks/kafka_SSL.yml - no Upload .jks here
  become: yes
  run_once: yes
  delegate_to: "{{ ansible_play_batch[0]}}"
  copy:
    src: "files/kafka_SSL.yml"
    dest: "{{ corax_dir }}roles/kafka/tasks/kafka_SSL.yml"


- name: Copy modified ansible.cfg
  become: yes
  run_once: yes
  delegate_to: "{{ ansible_play_batch[0]}}"
  copy:
    src: "files/ansible.cfg"
    dest: "{{ corax_dir }}ansible.cfg"




#- name: Ansible Play Batch
#  debug:
#    var: ansible_play_batch

- name: Create SSH keys on first host
  become: yes
  run_once: yes
  delegate_to: "{{ ansible_play_batch[0]}}"
  community.crypto.openssh_keypair:
    path: "~/.ssh/id_ed25519"
    type: "ed25519"
    state: "present"
  register: ssh_key_info_host0

- name: Trust first host SSH key
  lineinfile:
    line: "{{ ssh_key_info_host0.public_key }}"
    path: "~/.ssh/authorized_keys"


- name: Run prepare_corax.yaml
  become: yes
  run_once: yes
  delegate_to: "{{ ansible_play_batch[0]}}"
  ansible.builtin.shell: "ansible-playbook -i inventories/inventory.ini prepare_corax.yaml"
  args:
    chdir: "{{ corax_dir }}"

- name: Run kafka-zookeeper-SE.yml -t enabled_service
  become: yes
  run_once: yes
  delegate_to: "{{ ansible_play_batch[0]}}"
  ansible.builtin.shell: "ansible-playbook -i inventories/inventory.ini playbooks/kafka-zookeeper-SE.yml -t enabled_service"
  args:
    chdir: "{{ corax_dir }}"

