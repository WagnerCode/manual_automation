- name: Apply terraform configs
  delegate_to: localhost
  run_once: true
  community.general.terraform:
     project_path: "{{ playbook_dir}}/tf/"
     state: present
     force_init: true

- name: Wait for machines online (up to 15 min)
  ansible.builtin.wait_for_connection:
    delay: 10
    sleep: 30
    timeout: 900

