- name: Setting IPA domain
  set_fact:
    ipaclient_domain: "{{ config.ipa_params[0].domain }}" 

- name: Setting IPA admin principal
  set_fact:
    ipaadder_principal: "{{ tf_vars.IPA_ADDER }}" 

- name: Setting IPA admin password
  set_fact:
    ipaadder_password: "{{ tf_vars.IPA_ADDER_PASSWORD }}" 

- name: Set FQDN
  set_fact:
    ansible_facts:
      fqdn: "{{ inventory_hostname }}.{{ domain }}"

#- name: Add host to FreeIPA domain
#  include_role:
#    name: freeipa.ansible_freeipa.ipaclient
