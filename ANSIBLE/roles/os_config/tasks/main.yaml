- name: Create a partition 
  become: yes
  community.general.parted:
    align: "optimal"
    device: "{{ config.vm_params[0].hdd_data_device }}"
    label: "gpt"
    name: data
    part_start: "0%"
    part_end: "100%"
    state: "present"
    unit: "%"
    number: 1

- name: Create Physical Volume
  become: yes
  community.general.lvm_pv:
    device: "{{ config.vm_params[0].hdd_data_device }}1"
    state: "present"

- name: Create Volume Group
  become: yes
  community.general.lvg:
    vg: "vg_data"
    pvs: "{{ config.vm_params[0].hdd_data_device }}1"

- name: Create Logical Volume
  become: yes
  community.general.lvol:
    vg: "vg_data"
    lv: "lv_data"
    size: "100%VG"

- name: Create filesystem on the data LV
  become: yes
  community.general.filesystem:
    fstype: "ext4"
    dev: "/dev/vg_data/lv_data"

- name: Check if Cluster Type is Kafka - for now only Kafka is supported.
  fail:
    msg: "Only Kafka Cluster type is supported at the moment. We have no idea where to mount data disk for other types of clusters. Must be added later."
  when: config.vm_params[0].cluster_type != "kafka"

- name: Create MountPoint
  become: yes
  file:
    path: "/pub"
    state: "directory"
    mode: "0755"
    owner: "root"
    group: "root"

- name: Mount filesystem
  become: yes
  ansible.posix.mount:
    path: "/pub"
    src: "/dev/vg_data/lv_data"
    fstype: "ext4"
    state: "mounted"

  



