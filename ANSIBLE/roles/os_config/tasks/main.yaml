- name: Trust wheel group for passwordless sudo
  become: yes
  lineinfile:
    path: /etc/sudoers
    regexp: '^WHEEL_USERS\s+ALL=\(ALL\)\s+ALL'
    line: "WHEEL_USERS ALL=(ALL) NOPASSWD: ALL"

- name: Configure Chrony
  become: yes
  ansible.builtin.template:
    src: templates/chrony_conf.tmpl
    dest: "/etc/chrony.conf"
    #owner: root
    #group: root
    mode: 0644

- name: Restart Chrony
  become: yes
  service:
    name: chrony
    state: restarted


- name: Hosts file
  become: yes
  ansible.builtin.template:
     src: templates/hosts.tmpl
     dest: /etc/hosts
     owner: root
     group: root
     mode: 0644

- name: APT sources list
  become: yes
  copy:
     src: templates/sources.list
     dest: /etc/apt/sources.list
     owner: root
     group: root
     mode: '0644'

- name: APT update
  become: yes
  command: "apt-get update"

- name: APT install packages
  become: yes
  package:
    name:
    - freeipa-client
    - zip
    - java-17-openjdk-headless
    - unzip
    - sshpass
    - jq
    - acl
    - ansible
    state: present

- name: Control sudo public
  become: yes
  shell:
    cmd: 'control sudo public'

- name: Set FQDN hostanme
  become: yes
  shell:
    cmd: 'hostnamectl hostname {{inventory_hostname}}.{{domain}}'


- name: Start and enable certmonger
  become: yes
  service:
    name: certmonger
    enabled: true
    state: started


